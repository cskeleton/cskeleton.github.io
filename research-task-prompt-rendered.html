<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>检索分析任务 · Prompt</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #21253a;
    --border: #2a2f45;
    --accent: #6c8ef5;
    --accent2: #a78bfa;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --code-bg: #141724;
    --code-border: #2d3548;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
    line-height: 1.8;
    padding: 40px 20px;
  }
  .container { max-width: 860px; margin: 0 auto; }

  .header {
    text-align: center;
    padding: 50px 30px;
    background: linear-gradient(135deg, #1a1d2e 0%, #0f1629 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin-bottom: 30px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 50%, rgba(108,142,245,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  .header .subtitle { color: var(--text2); font-size: 0.95rem; }
  .badge-row { margin-top: 16px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
  .badge {
    display: inline-block;
    background: rgba(108,142,245,0.15);
    border: 1px solid rgba(108,142,245,0.3);
    color: var(--accent);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
  }

  /* Download row */
  .download-row { text-align: center; margin-bottom: 30px; display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
  .download-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: #fff; text-decoration: none;
    padding: 11px 24px; border-radius: 10px; font-weight: 600;
    font-size: 0.9rem; transition: opacity 0.2s;
  }
  .download-btn:hover { opacity: 0.85; }

  /* Rendered markdown content */
  #content {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 50px;
    font-size: 0.88rem;
    line-height: 1.9;
  }

  /* Markdown styles */
  #content h1 { font-size: 1.6rem; color: #fff; margin: 0 0 20px; border-bottom: 2px solid var(--accent); padding-bottom: 12px; }
  #content h2 { font-size: 1.25rem; color: #fff; margin: 30px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  #content h3 { font-size: 1.05rem; color: #c7d2fe; margin: 20px 0 12px; }
  #content h4 { font-size: 0.95rem; color: var(--text); margin: 16px 0 8px; }

  #content p { color: var(--text2); margin: 10px 0; }
  #content strong { color: #fff; font-weight: 700; }
  #content em { color: var(--yellow); font-style: italic; }

  #content ul, #content ol { margin: 10px 0 10px 24px; color: var(--text2); }
  #content li { margin: 5px 0; }
  #content li::marker { color: var(--accent); }

  #content blockquote {
    background: rgba(108,142,245,0.06);
    border-left: 3px solid var(--accent);
    margin: 14px 0;
    padding: 12px 18px;
    color: var(--text2);
    border-radius: 0 8px 8px 0;
  }

  #content code {
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    color: #c792ea;
    padding: 2px 6px;
    border-radius: 5px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.82rem;
  }
  #content pre {
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    border-radius: 10px;
    padding: 16px 20px;
    overflow-x: auto;
    margin: 14px 0;
  }
  #content pre code {
    background: none;
    border: none;
    color: #a6accd;
    padding: 0;
    font-size: 0.82rem;
    line-height: 1.7;
  }

  #content table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0;
    font-size: 0.85rem;
  }
  #content th {
    background: var(--card2);
    color: var(--text2);
    padding: 10px 14px;
    text-align: left;
    border: 1px solid var(--border);
    font-weight: 600;
  }
  #content td {
    padding: 9px 14px;
    border: 1px solid var(--border);
    color: var(--text2);
  }
  #content tr:nth-child(even) td { background: rgba(42,47,69,0.3); }

  #content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  #content a { color: var(--accent); text-decoration: none; }
  #content a:hover { text-decoration: underline; }

  /* Sidebar nav (sticky) */
  .toc {
    position: sticky;
    top: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 24px;
    max-height: 70vh;
    overflow-y: auto;
  }
  .toc-title { font-size: 0.8rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; font-weight: 600; }
  .toc-list { list-style: none; }
  .toc-list li { margin: 4px 0; }
  .toc-list a { color: var(--text2); font-size: 0.85rem; text-decoration: none; transition: color 0.15s; }
  .toc-list a:hover { color: var(--accent); }
  .toc-list .toc-h2 { padding-left: 14px; font-size: 0.8rem; }
  .toc-list .toc-h3 { padding-left: 28px; font-size: 0.78rem; }

  .toc::-webkit-scrollbar { width: 4px; }
  .toc::-webkit-scrollbar-track { background: transparent; }
  .toc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .footer {
    text-align: center;
    padding: 30px;
    color: var(--text3);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  @media (max-width: 700px) {
    #content { padding: 24px 20px; }
    .toc { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🔍 检索分析任务 Prompt</h1>
    <div class="subtitle">全球宏观 × 跨市场资产配置 × A股/港股/美股走势推演</div>
    <div class="badge-row">
      <span class="badge">主 Agent: GPT-5.4 (High)</span>
      <span class="badge">Sub-agent: MiniMax M2.7</span>
      <span class="badge">ReAct × 最多5轮</span>
      <span class="badge">多语种强制检索</span>
    </div>
  </div>

  <div class="download-row">
    <a class="download-btn" href="research-task-prompt.md" download>⬇️ 下载原始 .md</a>
    <a class="download-btn" href="gc-portfolio-analysis-20260330.html">📊 持仓分析报告</a>
  </div>

  <!-- Table of Contents (auto-generated) -->
  <nav class="toc" id="toc">
    <div class="toc-title">目录</div>
    <ul class="toc-list" id="toc-list"></ul>
  </nav>

  <!-- Rendered content -->
  <article id="content">正在加载渲染...</article>

  <div class="footer">
    Prompt 来源：检索分析任务2.md &nbsp;|&nbsp; 托管于 cskeleton.github.io
  </div>
</div>

<script>
  // Load and render markdown
  fetch('research-task-prompt.md')
    .then(r => r.text())
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
      buildTOC(md);
    })
    .catch(() => {
      document.getElementById('content').innerHTML =
        '<p style="color:var(--text2)">无法加载原始文件，请访问 <a href="research-task-prompt.md" download>research-task-prompt.md</a> 直接下载。</p>';
    });

  // Build TOC from headings
  function buildTOC(md) {
    const toc = document.getElementById('toc-list');
    const lines = md.split('\n');
    lines.forEach(line => {
      const m = line.match(/^(#{1,3})\s+(.+)/);
      if (m) {
        const level = m[1].length;
        const text = m[2].replace(/[`*_]/g, '');
        const id = text.replace(/\s+/g, '-').replace(/[^\w\u4e00-\u9fff-]/g, '').toLowerCase();
        const li = document.createElement('li');
        li.className = level === 1 ? 'toc-h1' : level === 2 ? 'toc-h2' : 'toc-h3';
        li.innerHTML = `<a href="#${id}">${text}</a>`;
        toc.appendChild(li);
      }
    });
  }
</script>
</body>
</html>
